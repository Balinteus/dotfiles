# === TMUX CONFIG ===

# Set prefix to Ctrl-Space (C-Space = C-@)
set -g prefix C-Space
unbind C-b
bind C-Space send-prefix

# === TERMINAL & COLORS ===
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"
set -ga terminal-features ",*:clipboard"

# === BEHAVIOR ===
# Fix escape delay (vim esc lag)
set -sg escape-time 0

# Mouse support
set -g mouse on

# Increase scrollback buffer
set -g history-limit 50000

# Focus follows mouse
set -g focus-events on

# Automatically renumber windows
set -g renumber-windows on

# Set base index to 1
set -g base-index 1
set -g pane-base-index 1

# === LOOK & FEEL ===
set -g status-style 'fg=white,bg=colour237'
set -g status-right-length 200
set -g status-left '#[fg=white,bg=#{?client_prefix,colour117,#{?pane_in_mode,yellow,colour160}},bold]  #{session_name}  '
set -g status-right '#[fg=colour7,bg=colour240] %a %Y-%m-%d | %H:%M  #[fg=white,bg=#{?client_prefix,colour117,#{?pane_in_mode,yellow,colour160}}]  '
set -g status-interval 60

# Window status
set -g window-status-current-style 'fg=colour7,bg=colour240,bold'
set -g window-status-style 'fg=colour7,bg=colour237'

# Border colors
set -g pane-border-style fg=colour240
set -g pane-active-border-style "bg=default fg=colour160"

# Pane divider (dashed if supported, otherwise thin)
set -g pane-border-lines heavy

# Message styling
set -g message-style 'fg=white,bg=colour160'
set -g display-panes-time 3000

# === KEYBINDINGS ===

# Splits (<prefix> + | and -)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Window navigation (<prefix> + j/k/space)
bind -r j next-window
bind -r k previous-window
bind -r Space next-window

# Pane navigation (<prefix> + C-h/j/k/l)
bind -r C-h select-pane -L
bind -r C-j select-pane -D
bind -r C-k select-pane -U
bind -r C-l select-pane -R

# Quick pane swapping
bind "{" swap-pane -U
bind "}" swap-pane -D

# Rotate panes
bind C-o rotate-window
bind o select-pane -t:.+

# Window management
bind c new-window -c "#{pane_current_path}"
bind , command-prompt -I "#W" { rename-window -- "%%" }
bind . command-prompt "move-window -t %%"
bind x kill-pane
bind X kill-window

# Jump to or create terminal window
bind f run-shell 'if test "$(tmux display-message -p "#{window_name}")" = "term"; then tmux last-window; else tmux select-window -t term 2>/dev/null || tmux new-window -c "#{pane_current_path}" -n term; fi'

# Reloaded display
bind r source-file ~/.dotfiles/linux/.config/tmux/tmux.conf \; display "Config reloaded"

# === COPY MODE (VI) ===
set-window-option -g mode-keys vi

# Enter copy mode with Escape or <prefix> + [
bind Escape copy-mode
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi V send -X select-line
bind -T copy-mode-vi C-v send -X rectangle-toggle
bind -T copy-mode-vi y send -X copy-pipe-and-cancel 'xclip -in -selection clipboard'

# Scroll with mouse wheel in copy mode
bind -T copy-mode-vi MouseDown1Pane select-pane \; send -X begin-selection

# === MISC ===
# Allow opening the config in $EDITOR
bind e new-window -n "tmux-conf" sh -c '${EDITOR:-vim} ~/.config/tmux/tmux.conf'
